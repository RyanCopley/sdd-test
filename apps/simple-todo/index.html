<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .input-section {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }

        .todo-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .todo-input:focus {
            border-color: #667eea;
        }

        .todo-input::placeholder {
            color: #999;
        }

        .todo-list {
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .todo-item:hover {
            background-color: #f8f9fa;
        }

        .todo-item.completed {
            background-color: #f0f8f0;
            opacity: 0.8;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 50%;
            margin-right: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .todo-item.completed .todo-checkbox {
            background-color: #4CAF50;
            border-color: #4CAF50;
            position: relative;
        }

        .todo-item.completed .todo-checkbox::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
            padding: 5px 0;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #888;
        }

        .todo-delete {
            background: none;
            border: none;
            color: #ff4757;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background-color 0.3s ease;
            flex-shrink: 0;
        }

        .todo-delete:hover {
            background-color: #ffe6e6;
        }

        .empty-state {
            text-align: center;
            padding: 50px 30px;
            color: #999;
        }

        .empty-state img {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .stats {
            padding: 20px 30px;
            background-color: #f8f9fa;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                border-radius: 0;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .input-section {
                padding: 20px;
            }
            
            .todo-item {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Simple Todo</h1>
            <p>Stay organized and get things done</p>
        </div>
        
        <div class="input-section">
            <input 
                type="text" 
                class="todo-input" 
                placeholder="What needs to be done? Press Enter to add..."
                id="todoInput"
                maxlength="200"
            >
        </div>
        
        <div class="todo-list" id="todoList">
            <div class="empty-state" id="emptyState">
                <div style="font-size: 48px; margin-bottom: 20px;">📋</div>
                <h3>No todos yet</h3>
                <p>Add a todo above to get started!</p>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <span id="totalTodos">0</span> total • 
            <span id="completedTodos">0</span> completed • 
            <span id="pendingTodos">0</span> pending
            <button id="exportBtn" onclick="app.exportTodos()" style="margin-left: 20px; padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">Export JSON</button>
        </div>
    </div>

    <script>
        class TodoApp {
            constructor() {
                this.todos = this.loadTodos();
                this.todoInput = document.getElementById('todoInput');
                this.todoList = document.getElementById('todoList');
                this.emptyState = document.getElementById('emptyState');
                this.stats = document.getElementById('stats');
                
                this.bindEvents();
                this.render();
            }
            
            bindEvents() {
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.addTodo();
                    }
                });
            }
            
            addTodo() {
                const text = this.todoInput.value.trim();
                if (!text) return;
                
                const todo = {
                    id: Date.now().toString(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                
                this.todos.unshift(todo);
                this.todoInput.value = '';
                this.saveTodos();
                this.render();
            }
            
            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.saveTodos();
                    this.render();
                }
            }
            
            deleteTodo(id) {
                if (confirm('Are you sure you want to delete this todo?')) {
                    this.todos = this.todos.filter(t => t.id !== id);
                    this.saveTodos();
                    this.render();
                }
            }
            
            render() {
                if (this.todos.length === 0) {
                    this.emptyState.style.display = 'block';
                    this.todoList.innerHTML = '';
                    this.todoList.appendChild(this.emptyState);
                } else {
                    this.emptyState.style.display = 'none';
                    this.todoList.innerHTML = '';
                    
                    this.todos.forEach(todo => {
                        const todoElement = this.createTodoElement(todo);
                        this.todoList.appendChild(todoElement);
                    });
                }
                
                this.updateStats();
            }
            
            createTodoElement(todo) {
                const div = document.createElement('div');
                div.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                
                div.innerHTML = `
                    <div class="todo-checkbox" onclick="app.toggleTodo('${todo.id}')"></div>
                    <div class="todo-text" onclick="app.toggleTodo('${todo.id}')">${this.escapeHtml(todo.text)}</div>
                    <button class="todo-delete" onclick="app.deleteTodo('${todo.id}')" title="Delete todo">×</button>
                `;
                
                return div;
            }
            
            updateStats() {
                const total = this.todos.length;
                const completed = this.todos.filter(t => t.completed).length;
                const pending = total - completed;
                
                document.getElementById('totalTodos').textContent = total;
                document.getElementById('completedTodos').textContent = completed;
                document.getElementById('pendingTodos').textContent = pending;
            }
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            loadTodos() {
                try {
                    const saved = localStorage.getItem('simple-todos');
                    return saved ? JSON.parse(saved) : [];
                } catch (error) {
                    console.error('Error loading todos:', error);
                    return [];
                }
            }
            
            saveTodos() {
                try {
                    localStorage.setItem('simple-todos', JSON.stringify(this.todos));
                } catch (error) {
                    console.error('Error saving todos:', error);
                    alert('Unable to save todos. Storage may be full.');
                }
            }
            
            exportTodos() {
                const dataStr = JSON.stringify(this.todos, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                
                const exportFileDefaultName = 'todos-' + new Date().toISOString().slice(0,10) + '.json';
                
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            }
        }
        
        // Initialize the app when the page loads
        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new TodoApp();
        });
        
        // Handle page visibility changes to sync data
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && app) {
                // Reload todos when page becomes visible (in case changed in another tab)
                const freshTodos = app.loadTodos();
                if (JSON.stringify(freshTodos) !== JSON.stringify(app.todos)) {
                    app.todos = freshTodos;
                    app.render();
                }
            }
        });
    </script>
</body>
</html>
